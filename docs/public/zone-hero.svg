<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Zone field illustration</title>
  <desc id="desc">A stylized Zone landscape with a sunset, reactor silhouette, anomaly glow, campfire, patrol, and creatures in the foreground.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2836"/>
      <stop offset="34%" stop-color="#4f4650"/>
      <stop offset="60%" stop-color="#9a6649"/>
      <stop offset="78%" stop-color="#e29b57"/>
      <stop offset="100%" stop-color="#2c241f"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d563d"/>
      <stop offset="45%" stop-color="#342920"/>
      <stop offset="100%" stop-color="#120f0f"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d5a68"/>
      <stop offset="50%" stop-color="#5f5e56"/>
      <stop offset="100%" stop-color="#9d673e"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd59c"/>
      <stop offset="42%" stop-color="#f1a456"/>
      <stop offset="100%" stop-color="#f1a456" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="anomaly" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#effcff"/>
      <stop offset="18%" stop-color="#a8f2ff"/>
      <stop offset="44%" stop-color="#69d6ee"/>
      <stop offset="70%" stop-color="#28708e"/>
      <stop offset="100%" stop-color="#28708e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fire" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4b2"/>
      <stop offset="30%" stop-color="#ffbb5f"/>
      <stop offset="64%" stop-color="#ff7d2c"/>
      <stop offset="100%" stop-color="#ff7d2c" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur16" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="blur32" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
  </defs>

